name: CI

on:
  push:
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Lint and Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: autosupport
          POSTGRES_PASSWORD: autosupport
          POSTGRES_DB: autosupport
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U autosupport"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
    env:
      ENVIRONMENT: development
      SECRET_KEY: ci-secret-key-xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
      ADMIN_EMAIL: admin@example.com
      ADMIN_PASSWORD: TestPass123!
      DATABASE_URL: postgresql+asyncpg://autosupport:autosupport@127.0.0.1:5432/autosupport
      TEST_DATABASE_URL: postgresql+asyncpg://autosupport:autosupport@127.0.0.1:5432/autosupport
      REDIS_URL: redis://127.0.0.1:6379/0
      TEST_REDIS_URL: redis://127.0.0.1:6379/0
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: python -m pip install -e ".[dev]"

      - name: Run migrations
        run: alembic upgrade head

      - name: Lint
        run: ruff check .

      - name: Test
        run: pytest -q

  docker-build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        run: docker build -f Dockerfile -t autosupport-api:ci .

      - name: Build worker image
        run: docker build -f Dockerfile.worker -t autosupport-worker:ci .
